    <text x="972" y="1058" class="serif" font-size="19" fill="#0F1B2B">Manuel G. Davis</text>
    <text x="972" y="1082" font-size="10.5" letter-spacing="2" fill="#96763E" font-weight="600">OF COUNSEL</text>

    <rect x="120" y="1154" width="378" height="120" fill="#FFFFFF"/>
    <rect x="120" y="1154" width="3" height="120" fill="#B99457"/>
    <text x="150" y="1202" class="serif" font-size="19" fill="#0F1B2B">Maureen Johnson</text>
    <text x="150" y="1226" font-size="10.5" letter-spacing="2" fill="#96763E" font-weight="600">ASSOCIATE</text>

    <rect x="531" y="1154" width="378" height="120" fill="#FFFFFF"/>
    <rect x="531" y="1154" width="3" height="120" fill="#B99457"/>
    <text x="561" y="1202" class="serif" font-size="19" fill="#0F1B2B">Friday Jones</text>
    <text x="561" y="1226" font-size="10.5" letter-spacing="2" fill="#96763E" font-weight="600">ASSOCIATE</text>

    <rect x="942" y="1154" width="378" height="120" fill="#FFFFFF"/>
    <rect x="942" y="1154" width="3" height="120" fill="#B99457"/>
    <text x="972" y="1202" class="serif" font-size="19" fill="#0F1B2B">Dorcas Miriam</text>
    <text x="972" y="1226" font-size="10.5" letter-spacing="2" fill="#96763E" font-weight="600">DIRECTOR OF ADMINISTRATION</text>
