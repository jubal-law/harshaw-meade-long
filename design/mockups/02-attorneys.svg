  <!-- FAIR WITNESS BAND -->
  <rect y="1370" width="1440" height="300" fill="#0F1B2B"/>
  <text x="720" y="1466" text-anchor="middle" font-size="12" letter-spacing="4" fill="#B99457" font-weight="600">THE FAIR WITNESS STANDARD</text>
  <text x="720" y="1520" text-anchor="middle" class="serif" font-size="24" font-style="italic" fill="#F6F2EA">Every material representation we make is reviewed by counsel trained to attest</text>
  <text x="720" y="1556" text-anchor="middle" class="serif" font-size="24" font-style="italic" fill="#F6F2EA">only to what is actually known.</text>
  <text x="720" y="1608" text-anchor="middle" font-size="15" fill="#A7B0BD">We tell you what the house looks like on this side.</text>

  <!-- FOOTER -->
  <rect y="1970" width="1440" height="180" fill="#0F1B2B"/>
  <rect y="1970" width="1440" height="1" fill="#B99457"/>
  <text x="120" y="2028" class="serif" font-size="17" letter-spacing="2.5" fill="#F6F2EA">HARSHAW MEADE LONG · LLP</text>
  <text x="120" y="2054" font-size="12" fill="#A7B0BD">1907 Butler Place, Suite 100, Kansas City, Missouri 64108 · (816) 555-1939</text>
  <text x="560" y="2028" font-size="11" letter-spacing="2" fill="#A7B0BD">THE FIRM · ATTORNEYS · PRACTICE AREAS · CONTACT</text>
  <text x="1320" y="2028" text-anchor="end" font-size="10" letter-spacing="2" fill="#B99457" font-weight="600">DRAFTED, DESIGNED &amp; DEPLOYED BY JUBAL.LAW</text>
  <text x="120" y="2106" font-size="11" fill="#5A6B80">Attorney Advertising. Prior results do not guarantee a similar outcome. © 1939–2026 Harshaw, Meade &amp; Long LLP. This is a demonstration website.</text>

  <!-- CTA between sections -->
  <rect x="556" y="1770" width="328" height="54" fill="none" stroke="#B99457"/>
