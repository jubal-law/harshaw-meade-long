<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 2470" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif;}
      .kick{font-size:12px;letter-spacing:4px;fill:#96763E;font-weight:600;}
      .nav{font-size:12px;letter-spacing:2.5px;fill:#1F2937;font-weight:600;}
      .body{font-size:17px;fill:#1F2937;}
      .muted{font-size:13.5px;fill:#6B7480;}
    </style>
  </defs>

  <rect width="1440" height="2470" fill="#F6F2EA"/>
  <rect width="1440" height="4" fill="#B99457"/>

  <!-- HEADER -->
  <line x1="0" y1="92" x2="1440" y2="92" stroke="#E3DCCD"/>
  <text x="120" y="55" class="serif" font-size="21" letter-spacing="3.5" fill="#0F1B2B" font-weight="600">HARSHAW MEADE LONG</text>
  <text x="120" y="74" font-size="10" letter-spacing="3" fill="#96763E">ATTORNEYS &amp; COUNSELORS AT LAW · LLP</text>
  <text x="780" y="53" class="nav" fill="#96763E">THE FIRM</text>
  <line x1="780" y1="62" x2="858" y2="62" stroke="#B99457" stroke-width="2"/>
  <text x="905" y="53" class="nav">ATTORNEYS</text>
  <text x="1052" y="53" class="nav">PRACTICE AREAS</text>
  <text x="1242" y="53" class="nav">CONTACT</text>

  <!-- PAGE HEAD -->
  <text x="120" y="204" class="kick">THE FIRM</text>
  <text x="120" y="262" class="serif" font-size="44" fill="#0F1B2B">Founded 1939. Still arguing.</text>
  <line x1="120" y1="312" x2="1320" y2="312" stroke="#E3DCCD"/>

  <!-- HISTORY: two columns — text left, image right -->
  <text x="120" y="392" class="body">Harshaw, Meade &amp; Long was founded in 1939, in a single room above a Kansas</text>
  <text x="120" y="420" class="body">City bank, on a proposition that has not changed: a client is owed the whole of a</text>
  <text x="120" y="448" class="body">lawyer's judgment, not a committee's average.</text>

  <text x="120" y="500" class="body">The firm grew the slow way — by outcome. Harshaw built the counseling practice</text>
  <text x="120" y="528" class="body">on the principle that the best dispute is the one structured out of existence. Meade</text>
  <text x="120" y="556" class="body">built the litigation practice for the disputes that insisted. Long, who claims to have</text>
  <text x="120" y="584" class="body">seen every market cycle that matters, built everything designed to last longer than</text>
  <text x="120" y="612" class="body">its founders.</text>

  <text x="120" y="664" class="body">We remain deliberately small. We decline more matters than we accept. We plan</text>
  <text x="120" y="692" class="body">in decades because our clients do.</text>

  <!-- duotone image placeholder -->
  <rect x="920" y="360" width="400" height="360" fill="#0F1B2B"/>
  <rect x="950" y="360" width="22" height="360" fill="#1D3049"/>
  <rect x="1004" y="360" width="22" height="360" fill="#1D3049"/>
  <rect x="1058" y="360" width="22" height="360" fill="#1D3049"/>
  <rect x="1112" y="360" width="22" height="360" fill="#1D3049"/>
  <rect x="1166" y="360" width="22" height="360" fill="#1D3049"/>
  <rect x="1220" y="360" width="22" height="360" fill="#1D3049"/>
  <rect x="1274" y="360" width="22" height="360" fill="#1D3049"/>
  <text x="1120" y="700" text-anchor="middle" font-size="10" letter-spacing="2" fill="#5A6B80">[ DUOTONE IMAGE — 1939 BANK BUILDING ]</text>

  <!-- VALUES -->
  <line x1="120" y1="780" x2="1320" y2="780" stroke="#E3DCCD"/>
  <text x="120" y="856" class="kick">HOW WE PRACTICE</text>

  <text x="120" y="924" class="serif" font-size="26" fill="#0F1B2B">Candor</text>
  <text x="120" y="956" class="muted">We tell clients what is,</text>
  <text x="120" y="976" class="muted">not what sells.</text>

  <text x="540" y="924" class="serif" font-size="26" fill="#0F1B2B">Continuity</text>
  <text x="540" y="956" class="muted">Relationships measured</text>
  <text x="540" y="976" class="muted">in generations.</text>

  <text x="960" y="924" class="serif" font-size="26" fill="#0F1B2B">Craft</text>
  <text x="960" y="956" class="muted">Every document drafted as if it will be read</text>
  <text x="960" y="976" class="muted">aloud in court. Eventually, some are.</text>

  <!-- TIMELINE -->
  <line x1="120" y1="1040" x2="1320" y2="1040" stroke="#E3DCCD"/>
  <text x="120" y="1116" class="kick">A SHORT HISTORY</text>
  <line x1="120" y1="1180" x2="1320" y2="1180" stroke="#B99457"/>
  <g>
    <circle cx="160" cy="1180" r="5" fill="#B99457"/>
    <text x="160" y="1222" text-anchor="middle" class="serif" font-size="20" fill="#0F1B2B">1939</text>
    <text x="160" y="1246" text-anchor="middle" class="muted">Founded</text>

    <circle cx="520" cy="1180" r="5" fill="#B99457"/>
    <text x="520" y="1222" text-anchor="middle" class="serif" font-size="20" fill="#0F1B2B">1948</text>
    <text x="520" y="1246" text-anchor="middle" class="muted">First appellate victory</text>

    <circle cx="880" cy="1180" r="5" fill="#B99457"/>
    <text x="880" y="1222" text-anchor="middle" class="serif" font-size="20" fill="#0F1B2B">1961</text>
    <text x="880" y="1246" text-anchor="middle" class="muted">Harshaw doctrine adopted</text>

    <circle cx="1240" cy="1180" r="5" fill="#B99457"/>
    <text x="1240" y="1222" text-anchor="middle" class="serif" font-size="20" fill="#0F1B2B">2026</text>
    <text x="1240" y="1246" text-anchor="middle" class="muted">Becomes the demonstration</text>
    <text x="1240" y="1264" text-anchor="middle" class="muted">practice of Jubal.law</text>
  </g>

  <!-- PULL QUOTE -->
  <rect y="1350" width="1440" height="260" fill="#0F1B2B"/>
  <text x="720" y="1452" text-anchor="middle" class="serif" font-size="34" font-style="italic" fill="#F6F2EA">“Front!”</text>
  <text x="720" y="1500" text-anchor="middle" font-size="14" font-style="italic" fill="#A7B0BD">— traditional summons to the duty secretary, still shouted fondly</text>
  <text x="720" y="1536" text-anchor="middle" font-size="11" letter-spacing="3" fill="#B99457" font-weight="600">J. E. HARSHAW</text>

  <!-- HOMAGE -->
  <line x1="520" y1="1690" x2="920" y2="1690" stroke="#B99457"/>
  <text x="720" y="1740" text-anchor="middle" class="kick">A WORD ABOUT OUR NAMES</text>
  <text x="720" y="1786" text-anchor="middle" class="serif" font-size="28" fill="#0F1B2B">An homage, freely admitted.</text>
  <text x="720" y="1828" text-anchor="middle" font-size="15" fill="#4A5462">Harshaw, Meade &amp; Long is a fictional firm. Our partners are borrowed, with affection and respect, from the works of</text>
  <text x="720" y="1852" text-anchor="middle" font-size="15" fill="#4A5462">Robert A. Heinlein — who gave American letters its finest lawyer, its longest-lived counselor, and more good sense</text>
  <text x="720" y="1876" text-anchor="middle" font-size="15" fill="#4A5462">per page than most law libraries. The firm exists as the demonstration practice of Jubal.law; its matters are as</text>
  <text x="720" y="1900" text-anchor="middle" font-size="15" fill="#4A5462">fictional as its partners. No legal services are offered; no affiliation with the Heinlein estate is claimed or implied.</text>
  <text x="720" y="1936" text-anchor="middle" class="serif" font-size="16" font-style="italic" fill="#1F2937">We are, simply, readers who never quite got over the books.</text>
  <line x1="520" y1="1972" x2="920" y2="1972" stroke="#B99457"/>

  <!-- CTA -->
  <rect x="556" y="2050" width="328" height="54" fill="none" stroke="#B99457"/>
  <text x="720" y="2083" text-anchor="middle" font-size="12" letter-spacing="3" fill="#96763E" font-weight="600">MEET OUR ATTORNEYS</text>

  <!-- FOOTER -->
  <rect y="2290" width="1440" height="180" fill="#0F1B2B"/>
  <rect y="2290" width="1440" height="1" fill="#B99457"/>
  <text x="120" y="2348" class="serif" font-size="17" letter-spacing="2.5" fill="#F6F2EA">HARSHAW MEADE LONG · LLP</text>
  <text x="120" y="2374" font-size="12" fill="#A7B0BD">1907 Butler Place, Suite 100, Kansas City, Missouri 64108 · (816) 555-1939</text>
  <text x="560" y="2348" font-size="11" letter-spacing="2" fill="#A7B0BD">THE FIRM · ATTORNEYS · PRACTICE AREAS · CONTACT</text>
  <text x="1320" y="2348" text-anchor="end" font-size="10" letter-spacing="2" fill="#B99457" font-weight="600">DRAFTED, DESIGNED &amp; DEPLOYED BY JUBAL.LAW</text>
  <text x="120" y="2426" font-size="11" fill="#5A6B80">Attorney Advertising. Prior results do not guarantee a similar outcome. © 1939–2026 Harshaw, Meade &amp; Long LLP. This is a demonstration website.</text>
</svg>
