  <text x="960" y="1752" class="serif" font-size="22" fill="#0F1B2B">Lazarus Long</text>
  <text x="960" y="1776" font-size="11" letter-spacing="2.5" fill="#96763E" font-weight="600">SENIOR COUNSEL</text>
  <text x="960" y="1798" class="muted">Longest-serving lawyer, by some margin</text>

  <text x="120" y="1846" font-size="12" letter-spacing="3" fill="#96763E" font-weight="600">ALL ATTORNEYS  →</text>

  <!-- ============ PRACTICE AREAS ============ -->
  <text x="120" y="1986" class="kick">WHAT WE DO</text>
  <text x="120" y="2040" class="serif" font-size="40" fill="#0F1B2B">Six practices. One standard.</text>

