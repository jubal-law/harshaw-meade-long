  <text x="120" y="268" class="kickL">ESTABLISHED 1939</text>
  <text x="120" y="346" class="serif" font-size="62" fill="#F6F2EA" font-weight="500">Counsel for the long view.</text>
  <text x="120" y="404" font-size="18" fill="#A7B0BD">For nearly a century, Harshaw, Meade &amp; Long has advised the people and</text>
  <text x="120" y="432" font-size="18" fill="#A7B0BD">enterprises who plan in decades, not quarters.</text>
  <rect x="120" y="486" width="208" height="54" fill="none" stroke="#B99457"/>
  <text x="224" y="519" text-anchor="middle" font-size="12" letter-spacing="3" fill="#B99457" font-weight="600">OUR PRACTICE</text>

