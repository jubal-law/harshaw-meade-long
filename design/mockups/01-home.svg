  <text x="120" y="1752" class="serif" font-size="22" fill="#0F1B2B">Jubal E. Harshaw</text>
  <text x="120" y="1776" font-size="11" letter-spacing="2.5" fill="#96763E" font-weight="600">SENIOR PARTNER</text>
