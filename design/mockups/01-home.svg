    <text x="557" y="2132" class="serif" font-size="20" fill="#0F1B2B">Complex Litigation &amp; Appeals</text>
    <text x="557" y="2160" class="muted">We try cases rarely and win them regularly.</text>
    <text x="557" y="2178" class="muted">Most disputes end at our first brief.</text>
    <text x="557" y="2216" font-size="11" letter-spacing="2" fill="#96763E" font-weight="600">READ MORE →</text>

