  <!-- ============ THE FIRM ============ -->
  <text x="120" y="964" class="kick">THE FIRM</text>
  <text x="120" y="1022" class="serif" font-size="40" fill="#0F1B2B">Judgment, above all.</text>
  <text x="120" y="1072" class="body">Clients do not retain us for boilerplate. They retain us for judgment — the kind that is</text>
  <text x="120" y="1100" class="body">earned slowly and applied precisely. We are deliberately small, deliberately senior,</text>
  <text x="120" y="1128" class="body">and deliberate in everything else.</text>
  <rect x="120" y="1166" width="226" height="52" fill="none" stroke="#B99457"/>
  <text x="233" y="1198" text-anchor="middle" font-size="12" letter-spacing="3" fill="#96763E" font-weight="600">ABOUT THE FIRM</text>

