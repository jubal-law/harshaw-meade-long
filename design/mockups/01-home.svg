    <text x="557" y="2332" class="serif" font-size="20" fill="#0F1B2B">Water &amp; Natural Resource Rights</text>
    <text x="557" y="2360" class="muted">Few assets are more contested or less</text>
    <text x="557" y="2378" class="muted">understood. We grok water law.</text>
    <text x="557" y="2416" font-size="11" letter-spacing="2" fill="#96763E" font-weight="600">READ MORE →</text>

    <rect x="942" y="2284" width="378" height="168" fill="#FFFFFF"/>
    <rect x="942" y="2284" width="378" height="3" fill="#B99457"/>
    <text x="968" y="2332" class="serif" font-size="20" fill="#0F1B2B">Aerospace &amp; Frontier Commerce</text>
    <text x="968" y="2360" class="muted">Launch services, lunar mineral claims,</text>
    <text x="968" y="2378" class="muted">long-haul ventures. Our contracts hold.</text>
    <text x="968" y="2416" font-size="11" letter-spacing="2" fill="#96763E" font-weight="600">READ MORE →</text>
