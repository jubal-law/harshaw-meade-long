  <text x="540" y="1752" class="serif" font-size="22" fill="#0F1B2B">Hazel M. Meade</text>
  <text x="540" y="1776" font-size="11" letter-spacing="2.5" fill="#96763E" font-weight="600">MANAGING PARTNER</text>
  <text x="540" y="1798" class="muted">Appellate &amp; complex negotiation</text>
  <!-- card 3 -->
