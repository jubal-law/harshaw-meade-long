  <g>
    <text x="270" y="762" text-anchor="middle" class="serif" font-size="46" fill="#0F1B2B">87</text>
    <text x="270" y="794" text-anchor="middle" font-size="11" letter-spacing="2.5" fill="#8A93A1">YEARS OF PRACTICE</text>
