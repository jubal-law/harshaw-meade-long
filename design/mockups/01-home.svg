  <g>
    <rect x="120" y="2084" width="378" height="168" fill="#FFFFFF"/>
    <rect x="120" y="2084" width="378" height="3" fill="#B99457"/>
    <text x="146" y="2132" class="serif" font-size="20" fill="#0F1B2B">Corporate &amp; Private Enterprise</text>
