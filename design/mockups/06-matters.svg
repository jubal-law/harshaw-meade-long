<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 2080" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif;}
      .kick{font-size:12px;letter-spacing:4px;fill:#96763E;font-weight:600;}
      .nav{font-size:12px;letter-spacing:2.5px;fill:#1F2937;font-weight:600;}
      .body{font-size:17px;fill:#1F2937;}
      .muted{font-size:13.5px;fill:#6B7480;}
      .tag{font-size:10.5px;letter-spacing:2.5px;fill:#96763E;font-weight:600;}
      .narr{font-size:15px;fill:#3A4350;}
      .keep{font-size:13.5px;fill:#1F2937;}
    </style>
  </defs>

  <rect width="1440" height="2080" fill="#F6F2EA"/>
  <rect width="1440" height="4" fill="#B99457"/>

  <!-- HEADER (nav with MATTERS) -->
  <line x1="0" y1="92" x2="1440" y2="92" stroke="#E3DCCD"/>
  <text x="120" y="55" class="serif" font-size="21" letter-spacing="3.5" fill="#0F1B2B" font-weight="600">HARSHAW MEADE LONG</text>
  <text x="120" y="74" font-size="10" letter-spacing="3" fill="#96763E">ATTORNEYS &amp; COUNSELORS AT LAW · LLP</text>
  <text x="655" y="53" class="nav">THE FIRM</text>
  <text x="780" y="53" class="nav">ATTORNEYS</text>
  <text x="927" y="53" class="nav">PRACTICE AREAS</text>
  <text x="1117" y="53" class="nav" fill="#96763E">MATTERS</text>
  <line x1="1117" y1="62" x2="1192" y2="62" stroke="#B99457" stroke-width="2"/>
  <text x="1242" y="53" class="nav">CONTACT</text>

  <!-- PAGE HEAD -->
  <text x="120" y="204" class="kick">SELECTED WORK</text>
  <text x="120" y="262" class="serif" font-size="44" fill="#0F1B2B">Representative matters.</text>
  <text x="120" y="312" class="body">A firm is its matters. A selection of ours follows, described plainly.</text>
  <text x="120" y="384" class="muted" font-size="11.5" font-style="italic">All matters described are fictional. Any resemblance to real parties or proceedings is coincidental.</text>
  <line x1="120" y1="420" x2="1320" y2="420" stroke="#E3DCCD"/>

  <!-- MATTER 1 -->
  <rect x="120" y="468" width="1200" height="304" fill="#FFFFFF"/>
  <rect x="120" y="468" width="1200" height="3" fill="#B99457"/>
  <text x="160" y="538" class="serif" font-size="26" font-style="italic" fill="#0F1B2B">In re Estate of V. M. Smith</text>
  <text x="160" y="566" class="tag">TRUSTS &amp; ESTATES</text>
  <text x="160" y="604" class="narr">A young decedent of unusual estate: assets in four jurisdictions, heirs in none of them, and a will whose witnesses</text>
  <text x="160" y="628" class="narr">could attest only to what they actually saw. Ninety years of family files bore on the question.</text>
  <rect x="160" y="668" width="1120" height="64" fill="none" stroke="#E3DCCD"/>
  <text x="184" y="706" class="keep"><tspan font-weight="600" fill="#96763E">WHERE JUBAL EARNED ITS KEEP:</tspan>  The firm's complete history with the family — every instrument since 1948 — indexed and answerable in an afternoon.</text>

  <!-- MATTER 2 -->
  <rect x="120" y="804" width="1200" height="304" fill="#FFFFFF"/>
  <rect x="120" y="804" width="1200" height="3" fill="#B99457"/>
  <text x="160" y="874" class="serif" font-size="26" font-style="italic" fill="#0F1B2B">Stone v. Tycho Under Development Corp.</text>
  <text x="160" y="902" class="tag">COMPLEX LITIGATION</text>
  <text x="160" y="940" class="narr">Forty thousand pages of discovery, one timeline, and three inconsistencies the other side hoped no one</text>
  <text x="160" y="964" class="narr">would line up. We lined them up.</text>
  <rect x="160" y="1004" width="1120" height="64" fill="none" stroke="#E3DCCD"/>
  <text x="184" y="1042" class="keep"><tspan font-weight="600" fill="#96763E">WHERE JUBAL EARNED ITS KEEP:</tspan>  Discovery prep — the week of associate work that took an hour, with every fact cited to its page.</text>

  <!-- MATTER 3 -->
  <rect x="120" y="1140" width="1200" height="304" fill="#FFFFFF"/>
  <rect x="120" y="1140" width="1200" height="3" fill="#B99457"/>
  <text x="160" y="1210" class="serif" font-size="26" font-style="italic" fill="#0F1B2B">Davis Water Cooperative — intake-rights restructuring</text>
  <text x="160" y="1238" class="tag">WATER RIGHTS</text>
  <text x="160" y="1276" class="narr">Eleven stakeholders, sixty years of overlapping agreements, and a cooperative that needed one document</text>
  <text x="160" y="1300" class="narr">everyone could sign.</text>
  <rect x="160" y="1340" width="1120" height="64" fill="none" stroke="#E3DCCD"/>
  <text x="184" y="1378" class="keep"><tspan font-weight="600" fill="#96763E">WHERE JUBAL EARNED ITS KEEP:</tspan>  Drafting in the firm's own voice, from the firm's own precedent — not generic AI prose.</text>

  <!-- PULL QUOTE -->
  <rect y="1520" width="1440" height="240" fill="#0F1B2B"/>
  <text x="720" y="1620" text-anchor="middle" class="serif" font-size="28" font-style="italic" fill="#F6F2EA">“Every matter gets the whole of the firm’s judgment.”</text>
  <text x="720" y="1668" text-anchor="middle" font-size="11" letter-spacing="3" fill="#B99457" font-weight="600">H. M. MEADE, MANAGING PARTNER</text>

  <!-- FOOTER -->
  <rect y="1900" width="1440" height="180" fill="#0F1B2B"/>
  <rect y="1900" width="1440" height="1" fill="#B99457"/>
  <text x="120" y="1958" class="serif" font-size="17" letter-spacing="2.5" fill="#F6F2EA">HARSHAW MEADE LONG · LLP</text>
  <text x="120" y="1984" font-size="12" fill="#A7B0BD">1907 Butler Place, Suite 100, Kansas City, Missouri 64108 · (816) 555-1939</text>
  <text x="560" y="1958" font-size="11" letter-spacing="2" fill="#A7B0BD">THE FIRM · ATTORNEYS · PRACTICE AREAS · MATTERS · CONTACT</text>
  <text x="1320" y="1958" text-anchor="end" font-size="10" letter-spacing="2" fill="#B99457" font-weight="600">DRAFTED, DESIGNED &amp; DEPLOYED BY JUBAL.LAW</text>
  <text x="120" y="2036" font-size="11" fill="#5A6B80">Attorney Advertising. Prior results do not guarantee a similar outcome. © 1939–2026 Harshaw, Meade &amp; Long LLP. This is a demonstration website.</text>
</svg>
